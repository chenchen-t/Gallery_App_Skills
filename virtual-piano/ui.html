<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virtual Piano</title>
    <style>
        body {
            margin: 0;
            background-color: #1e1e2f;
            display: flex;
            align-items: center;
            height: 100vh;
            /* Prevent vertical scrolling on the whole page */
            overflow-y: hidden; 
        }

        /* This container allows the horizontal scrolling! */
        #piano-scroll-container {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            /* Hides the scrollbar visually but keeps functionality */
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            padding: 20px;
        }
        #piano-scroll-container::-webkit-scrollbar {
            display: none; 
        }

        #piano {
            display: inline-flex;
            position: relative;
            background: #333;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* White Keys */
        .key.white {
            width: 60px;
            height: 250px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 0 0 5px 5px;
            margin: 0 1px;
            position: relative;
            cursor: pointer;
            box-shadow: 0 4px 5px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;
        }
        .key.white:active, .key.white.active {
            background: #e0e0e0;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.4);
        }

        /* Black Keys */
        .key.black {
            width: 40px;
            height: 150px;
            background: linear-gradient(#333, #000);
            position: absolute;
            /* Positions the black key exactly between two white keys */
            right: -21px; 
            top: 0;
            z-index: 10;
            border-radius: 0 0 4px 4px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            cursor: pointer;
        }
        .key.black:active, .key.black.active {
            background: #111;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="piano-scroll-container">
        <div id="piano">
            <!-- Nesting the black key inside the white key makes positioning incredibly easy -->
            <div class="key white" data-note="C4"><div class="key black" data-note="Cs4"></div></div>
            <div class="key white" data-note="D4"><div class="key black" data-note="Ds4"></div></div>
            <div class="key white" data-note="E4"></div> <!-- No black key after E -->
            <div class="key white" data-note="F4"><div class="key black" data-note="Fs4"></div></div>
            <div class="key white" data-note="G4"><div class="key black" data-note="Gs4"></div></div>
            <div class="key white" data-note="A4"><div class="key black" data-note="As4"></div></div>
            <div class="key white" data-note="B4"></div> <!-- No black key after B -->
        </div>
    </div>

    <script>
        // Select all keys (both white and black)
        const keys = document.querySelectorAll('.key');

        keys.forEach(key => {
            // Use 'pointerdown' so it registers instantly on touchscreens AND mice
            key.addEventListener('pointerdown', (event) => {
                // Prevent the white key from playing if we tapped the black key sitting on top of it
                event.stopPropagation(); 
                
                // Get the note name from the HTML data attribute
                const note = key.getAttribute('data-note');
                
                // Construct the URL to your GitHub assets folder
                const audioUrl = `assets/${note}.mp3`;
                
                // Create and play the sound
                const audio = new Audio(audioUrl);
                audio.currentTime = 0; // Allows rapid re-pressing
                audio.play().catch(e => console.warn("Audio not found yet:", e));

                // Add a visual 'pressed' effect
                key.classList.add('active');
            });

            // Remove the visual effect when the user lifts their finger
            key.addEventListener('pointerup', () => key.classList.remove('active'));
            key.addEventListener('pointerleave', () => key.classList.remove('active'));
        });
    </script>
</body>
</html>
