<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>88-Key Virtual Piano</title>
    <style>
        body {
            margin: 0;
            background-color: #1e1e2f;
            display: flex;
            align-items: center;
            height: 100vh;
            overflow-y: hidden; 
        }

        #piano-scroll-container {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            padding: 20px;
            touch-action: pan-x; 
        }
        #piano-scroll-container::-webkit-scrollbar {
            display: none; 
        }

        #piano {
            display: inline-flex;
            background: #333;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .key-group {
            position: relative;
            display: inline-block;
        }

        /* White Keys */
        .key.white {
            width: 60px;
            height: 250px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 0 0 5px 5px;
            margin: 0 1px;
            cursor: pointer;
            box-shadow: 0 4px 5px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;
        }
        .key.white:active, .key.white.active {
            background: #e0e0e0;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.4);
        }

        /* Black Keys */
        .key.black {
            width: 40px;
            height: 150px;
            background: linear-gradient(#333, #000);
            position: absolute;
            right: -20px; 
            top: 0;
            z-index: 10; 
            border-radius: 0 0 4px 4px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .key.black:active, .key.black.active {
            background: #111;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="piano-scroll-container">
        <!-- We leave this empty in the HTML because Javascript will fill it! -->
        <div id="piano"></div>
    </div>

    <script>
        const piano = document.getElementById('piano');
        let noteNumber = 1;

        // 1. GENERATE THE 88 KEYS DYNAMICALLY
        while (noteNumber <= 88) {
            const group = document.createElement('div');
            group.className = 'key-group';

            // Create the white key
            const whiteKey = document.createElement('div');
            whiteKey.className = 'key white';
            whiteKey.setAttribute('data-note', noteNumber);
            group.appendChild(whiteKey);

            // A standard piano has no black key after E (offset 4) and B (offset 11)
            // We use modulo math to figure out exactly what note we are on
            const cOffset = (noteNumber + 8) % 12;
            
            // If it's NOT an E, NOT a B, and NOT the final 88th key... add a black key!
            if (cOffset !== 4 && cOffset !== 11 && noteNumber !== 88) {
                noteNumber++; // Step up to the black key's number
                
                const blackKey = document.createElement('div');
                blackKey.className = 'key black';
                blackKey.setAttribute('data-note', noteNumber);
                group.appendChild(blackKey);
            }

            // Add the group to the piano
            piano.appendChild(group);
            
            // Move to the next white key for the next loop
            noteNumber++; 
        }

        // 2. ATTACH THE AUDIO EVENT LISTENERS
        const keys = document.querySelectorAll('.key');

        keys.forEach(key => {
            key.addEventListener('pointerdown', function(event) {
                event.stopPropagation(); 
                
                const note = this.getAttribute('data-note');
                
                // Keep this path matched to however you are pulling from GitHub!
                const audioUrl = `https://chenchen-t.github.io/Gallery_App_Skills/virtual-piano/assets/${note}.mp3`;
                
                const audio = new Audio(audioUrl);
                audio.currentTime = 0; 
                audio.play().catch(e => console.warn("Waiting for audio files:", e));

                this.classList.add('active');
            });

            key.addEventListener('pointerup', function() { this.classList.remove('active'); });
            key.addEventListener('pointerleave', function() { this.classList.remove('active'); });
        });
    </script>
</body>
</html>
