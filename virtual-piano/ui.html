<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Virtual Piano</title>
    <style>
        body {
            margin: 0;
            background-color: #1e1e2f;
            display: flex;
            align-items: center;
            height: 100vh;
            overflow-y: hidden; 
        }

        #piano-scroll-container {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            padding: 20px;
            /* Allows horizontal scrolling, but prevents vertical pull-to-refresh on mobile */
            touch-action: pan-x; 
        }
        #piano-scroll-container::-webkit-scrollbar {
            display: none; 
        }

        #piano {
            display: inline-flex;
            background: #333;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* NEW: A wrapper to hold the keys side-by-side without nesting them */
        .key-group {
            position: relative;
            display: inline-block;
        }

        /* White Keys */
        .key.white {
            width: 60px;
            height: 250px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 0 0 5px 5px;
            margin: 0 1px;
            cursor: pointer;
            box-shadow: 0 4px 5px rgba(0,0,0,0.2);
            -webkit-tap-highlight-color: transparent;
        }
        .key.white:active, .key.white.active {
            background: #e0e0e0;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.4);
        }

        /* Black Keys */
        .key.black {
            width: 40px;
            height: 150px;
            background: linear-gradient(#333, #000);
            position: absolute;
            /* -20px pushes it exactly halfway over the edge of the wrapper */
            right: -20px; 
            top: 0;
            z-index: 10; /* Forces it to the absolute top layer */
            border-radius: 0 0 4px 4px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .key.black:active, .key.black.active {
            background: #111;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="piano-scroll-container">
        <div id="piano">
            <!-- Notice how they are now siblings inside a 'key-group' wrapper! -->
            <div class="key-group">
                <div class="key white" data-note="1"></div>
                <div class="key black" data-note="2"></div>
            </div>
            <div class="key-group">
                <div class="key white" data-note="3"></div>
                <div class="key black" data-note="4"></div>
            </div>
            <div class="key-group">
                <div class="key white" data-note="5"></div>
                <!-- E has no black key! -->
            </div>
            <div class="key-group">
                <div class="key white" data-note="6"></div>
                <div class="key black" data-note="7"></div>
            </div>
            <div class="key-group">
                <div class="key white" data-note="8"></div>
                <div class="key black" data-note="9"></div>
            </div>
            <div class="key-group">
                <div class="key white" data-note="10"></div>
                <div class="key black" data-note="11"></div>
            </div>
            <div class="key-group">
                <div class="key white" data-note="12"></div>
                <!-- B has no black key! -->
            </div>
        </div>
    </div>

    <script>
        const keys = document.querySelectorAll('.key');

        keys.forEach(key => {
            key.addEventListener('pointerdown', function(event) {
                // By completely separating the HTML elements, this click is now 100% accurate
                event.stopPropagation(); 
                
                const note = this.getAttribute('data-note');
                const audioUrl = `assets/${note}.mp3`;
                
                const audio = new Audio(audioUrl);
                audio.currentTime = 0; 
                audio.play().catch(e => console.warn("Waiting for audio files:", e));

                this.classList.add('active');
            });

            key.addEventListener('pointerup', function() { this.classList.remove('active'); });
            key.addEventListener('pointerleave', function() { this.classList.remove('active'); });
        });
    </script>
</body>
</html>
